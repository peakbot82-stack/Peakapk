name: Build APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
    
    - name: Install build dependencies
      run: |
        sudo apt update
        sudo apt install -y \
          git zip unzip openjdk-17-jdk \
          python3-pip autoconf libtool \
          pkg-config zlib1g-dev \
          libncurses-dev libncursesw5-dev \
          cmake libffi-dev \
          libssl-dev liblzma-dev \
          libjpeg-dev libxml2-dev libxslt1-dev
    
    - name: Install Python packages
      run: |
        pip install --upgrade pip
        pip install buildozer cython setuptools wheel
        pip install -r requirements.txt
    
    - name: Accept Android SDK licenses
      run: |
        # Crear directorio para el SDK
        mkdir -p ~/.buildozer/android/platform/
        
        # Descargar sdkmanager si no existe
        if [ ! -f ~/.buildozer/android/platform/android-sdk/tools/bin/sdkmanager ]; then
          wget -q https://dl.google.com/android/repository/commandlinetools-linux-9477386_latest.zip
          unzip -q commandlinetools-linux-9477386_latest.zip
          mkdir -p ~/.buildozer/android/platform/android-sdk/cmdline-tools
          mv cmdline-tools ~/.buildozer/android/platform/android-sdk/cmdline-tools/latest
        fi
        
        # Aceptar licencias automáticamente
        export JAVA_HOME=/usr/lib/jvm/java-17-openjdk-amd64
        export PATH=$PATH:~/.buildozer/android/platform/android-sdk/cmdline-tools/latest/bin
        
        yes | sdkmanager --licenses || true
        yes | sdkmanager "platform-tools" "platforms;android-30" "build-tools;30.0.3" || true
      continue-on-error: true
    
    - name: Build APK with Buildozer
      run: |
        buildozer android debug
    
    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: predictor-pro-apk
        path: bin/*.apk
        if-no-files-found: error
