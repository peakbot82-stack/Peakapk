name: Build APK with p4a

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
    
    - name: Install dependencies
      run: |
        sudo apt update
        sudo apt install -y \
          git zip unzip openjdk-17-jdk \
          python3-pip autoconf libtool \
          pkg-config zlib1g-dev \
          libncurses-dev cmake libffi-dev \
          libssl-dev liblzma-dev \
          libjpeg-dev libxml2-dev libxslt1-dev
    
    - name: Install Python packages
      run: |
        pip install --upgrade pip
        pip install python-for-android cython setuptools wheel
        pip install -r requirements.txt
    
    - name: Install Android SDK & NDK
      run: |
        # Instalar SDK tools
        cd ~
        mkdir -p android-sdk/cmdline-tools
        cd android-sdk/cmdline-tools
        wget -q https://dl.google.com/android/repository/commandlinetools-linux-9477386_latest.zip
        unzip -q commandlinetools-linux-9477386_latest.zip
        mv cmdline-tools latest
        cd ~
        
        # Configurar variables
        export ANDROID_HOME=~/android-sdk
        export PATH=$PATH:$ANDROID_HOME/cmdline-tools/latest/bin
        
        # Aceptar licencias
        yes | sdkmanager --licenses || true
        
        # Instalar plataformas
        sdkmanager "platform-tools" "platforms;android-30" "build-tools;30.0.3"
        
        # Instalar NDK
        wget -q https://dl.google.com/android/repository/android-ndk-r23b-linux.zip
        unzip -q android-ndk-r23b-linux.zip
        export ANDROID_NDK_HOME=~/android-ndk-r23b
    
    - name: Build APK with p4a
      run: |
        export ANDROID_HOME=~/android-sdk
        export ANDROID_NDK_HOME=~/android-ndk-r23b
        
        # Crear directorio para el APK
        mkdir -p bin
        
        # Construir con arquitecturas específicas
        p4a apk \
          --requirements python3,kivy,requests,plyer,setuptools,cython \
          --private . \
          --package=org.tuempresa.predictorpro \
          --name="Predictor PRO" \
          --version=1.0.0 \
          --bootstrap=sdl2 \
          --android-api=30 \
          --minsdk=21 \
          --arch=arm64-v8a \
          --arch=armeabi-v7a \
          --permission INTERNET \
          --permission WRITE_EXTERNAL_STORAGE \
          --permission READ_EXTERNAL_STORAGE \
          --output bin/
    
    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: predictor-pro-apk
        path: bin/*.apk
        if-no-files-found: error
